<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Fintech Operations Dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#141a35"/>
      <stop offset="1" stop-color="#2a1a4a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#ffffff" opacity="0.045"/>
    </pattern>
    <clipPath id="round"><rect width="1280" height="320" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1280" height="320" fill="url(#bg)"/>
    <circle cx="1080" cy="60" r="220" fill="#7c3aed" opacity="0.10"/>
    <circle cx="1180" cy="280" r="160" fill="#10b981" opacity="0.08"/>
    <rect width="1280" height="320" fill="url(#dots)"/>
    <rect width="1280" height="6" fill="url(#acc)"/>
  </g>

  <!-- logo -->
  <g transform="translate(72,108)">
    <rect width="104" height="104" rx="28" fill="url(#logoG)" filter="url(#soft)"/>
    <text x="52" y="72" font-size="60" font-weight="800" fill="#ffffff" text-anchor="middle">F</text>
  </g>

  <!-- title + subtitle -->
  <text x="208" y="138" font-size="44" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">Fintech Operations Dashboard</text>
  <text x="210" y="176" font-size="20" font-weight="500" fill="#9aa6c4">Customer &#183; Wallet &#183; Transactions &#183; On&#8209;chain Risk</text>

  <!-- tech pills -->
  <g transform="translate(210,206)" font-size="14" font-weight="700">
    <g><rect width="104" height="30" rx="15" fill="#16203c" stroke="#2c3a63"/><text x="52" y="20" fill="#dbe4ff" text-anchor="middle">Angular 21</text></g>
    <g transform="translate(114,0)"><rect width="74" height="30" rx="15" fill="#16203c" stroke="#2c3a63"/><text x="37" y="20" fill="#dbe4ff" text-anchor="middle">NgRx</text></g>
    <g transform="translate(196,0)"><rect width="150" height="30" rx="15" fill="#16203c" stroke="#2c3a63"/><text x="75" y="20" fill="#a7f3d0" text-anchor="middle">Read&#8209;only Web3</text></g>
    <g transform="translate(354,0)"><rect width="70" height="30" rx="15" fill="#16203c" stroke="#2c3a63"/><text x="35" y="20" fill="#dbe4ff" text-anchor="middle">TR / EN</text></g>
    <g transform="translate(432,0)"><rect width="118" height="30" rx="15" fill="#16203c" stroke="#2c3a63"/><text x="59" y="20" fill="#dbe4ff" text-anchor="middle">Light / Dark</text></g>
  </g>

  <!-- right motif: KPI bars + shield + chain -->
  <g transform="translate(900,86)">
    <g>
      <rect x="0" y="84" width="20" height="44" rx="5" fill="#3b82f6" opacity="0.85"/>
      <rect x="28" y="58" width="20" height="70" rx="5" fill="#22d3ee" opacity="0.85"/>
      <rect x="56" y="30" width="20" height="98" rx="5" fill="#34d399" opacity="0.9"/>
      <rect x="84" y="68" width="20" height="60" rx="5" fill="#a855f7" opacity="0.85"/>
    </g>
    <g transform="translate(150,8)">
      <path d="M60 0 L116 22 V70 C116 104 92 122 60 134 C28 122 4 104 4 70 V22 Z" fill="#101a33" stroke="url(#acc)" stroke-width="3"/>
      <path d="M34 66 l18 18 l32 -40" fill="none" stroke="#34d399" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(286,40)" stroke="#a855f7" stroke-width="6" fill="none" opacity="0.95">
      <rect x="0" y="18" width="44" height="26" rx="13"/>
      <rect x="30" y="40" width="44" height="26" rx="13" stroke="#3b82f6"/>
    </g>
  </g>

  <!-- REAL vs SIMULATED legend -->
  <g transform="translate(910,236)" font-size="13" font-weight="600">
    <circle cx="6" cy="-4" r="6" fill="#34d399"/><text x="18" y="0" fill="#9aa6c4">REAL on&#8209;chain</text>
    <circle cx="150" cy="-4" r="6" fill="#fbbf24"/><text x="162" y="0" fill="#9aa6c4">SIMULATED</text>
  </g>
</svg>
